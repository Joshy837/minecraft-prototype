<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minecraft Prototype</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      overflow: hidden; background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    canvas { display: block; width: 100vw; height: 100vh; }

    /* ── Crosshair ── */
    #crosshair {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 20px; height: 20px;
      pointer-events: none; user-select: none;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255,255,255,0.88);
      box-shadow: 0 0 3px rgba(0,0,0,0.6);
      border-radius: 1px;
    }
    #crosshair::before {
      width: 2px; height: 100%;
      left: 50%; top: 0; transform: translateX(-50%);
    }
    #crosshair::after {
      width: 100%; height: 2px;
      top: 50%; left: 0; transform: translateY(-50%);
    }

    /* ── HUD Bottom ── */
    #hud-bottom {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column;
      align-items: flex-start; gap: 8px;
      pointer-events: none;
    }
    #hearts { image-rendering: pixelated; display: block; }
    #damage-flash {
      position: fixed; inset: 0;
      background: rgba(180,0,0,0);
      pointer-events: none;
      transition: background 0.08s ease-in;
    }
    #damage-flash.active { background: rgba(180,0,0,0.35); }
    #water-overlay {
      position: fixed; inset: 0;
      background: rgba(12,48,130,0);
      pointer-events: none;
      transition: background 0.15s ease;
    }
    #water-overlay.active { background: rgba(12,48,130,0.42); }

    /* ── Hotbar ── */
    #hotbar {
      display: flex; gap: 5px;
      pointer-events: auto;
      padding: 5px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 18px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .slot {
      width: 56px; height: 56px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      border-radius: 13px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: rgba(255,255,255,0.85); font-size: 9px;
      user-select: none; cursor: default;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
      position: relative;
    }
    .slot.active {
      border-color: rgba(255,255,255,0.65);
      background: rgba(255,255,255,0.18);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.18), inset 0 1px 0 rgba(255,255,255,0.2);
    }
    .slot:not(.active):hover {
      background: rgba(255,255,255,0.11);
      border-color: rgba(255,255,255,0.25);
    }
    .slot-icon {
      width: 34px; height: 34px;
      border-radius: 5px; margin-bottom: 2px;
      image-rendering: pixelated; display: block;
    }

    /* ── F3 Debug ── */
    #f3 {
      position: fixed; inset: 0;
      display: none; justify-content: space-between; align-items: flex-start;
      pointer-events: none; z-index: 5; padding: 10px; gap: 10px;
    }
    #f3.open { display: flex; }
    .f3-col {
      display: flex; flex-direction: column; gap: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 8px 10px;
    }
    .f3-line {
      font-family: 'SF Mono', 'Menlo', 'Courier New', monospace;
      font-size: 11.5px; color: rgba(255,255,255,0.82);
      padding: 0 2px; line-height: 1.72;
      white-space: pre; min-height: 1.72em;
    }
    .f3-head { color: #30d158; font-weight: 600; }

    /* ── Inventory ── */
    #inventory {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: none; align-items: center; justify-content: center;
      z-index: 30;
    }
    #inventory.open { display: flex; }
    #inv-panel {
      background: rgba(14, 14, 28, 0.72);
      backdrop-filter: blur(48px) saturate(180%);
      -webkit-backdrop-filter: blur(48px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 22px;
      padding: 16px 18px 18px;
      image-rendering: pixelated;
      box-shadow: 0 32px 80px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.1);
      position: relative;
    }
    .inv-close-btn {
      position: absolute; top: 10px; right: 10px;
      width: 24px; height: 24px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 50%;
      color: rgba(255,255,255,0.75); font-size: 11px; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      padding: 0; line-height: 1;
      transition: background 0.15s, border-color 0.15s;
    }
    .inv-close-btn:hover { background: rgba(255,59,48,0.55); border-color: rgba(255,59,48,0.5); color: #fff; }
    .inv-title {
      font-size: 0.85rem; font-weight: 600; letter-spacing: 0.02em;
      color: rgba(255,255,255,0.9); margin-bottom: 12px;
    }
    .inv-slot {
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.11);
      border-radius: 9px;
      position: relative;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      user-select: none;
      transition: background 0.12s, border-color 0.12s;
    }
    .inv-slot:not(.inv-slot-passive):hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.28);
    }
    .inv-slot-passive { cursor: default; }
    .inv-icon {
      width: 32px; height: 32px;
      image-rendering: pixelated;
      display: block; pointer-events: none;
    }
    .inv-count {
      position: absolute; bottom: 2px; right: 3px;
      font-size: 9px; font-weight: 700;
      color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.9);
      line-height: 1; pointer-events: none;
    }
    .inv-grid-9 {
      display: grid;
      grid-template-columns: repeat(9, 40px);
      gap: 3px;
    }
    .inv-top-row {
      display: flex; gap: 12px; align-items: flex-start;
      margin-bottom: 4px;
    }
    .inv-armor-player {
      display: flex; gap: 6px; align-items: center;
    }
    .inv-armor-col {
      display: flex; flex-direction: column; gap: 3px;
    }
    .inv-armor-slot { cursor: default; }
    .inv-armor-icon { font-size: 18px; pointer-events: none; }
    .inv-player-model {
      width: 58px; height: 166px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
    }
    .inv-player-figure { font-size: 52px; pointer-events: none; }
    .inv-offhand-area {
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      height: 166px; padding-bottom: 2px;
    }
    .inv-crafting {
      display: flex; flex-direction: column; gap: 6px;
      margin-left: auto;
    }
    .inv-craft-label {
      font-size: 0.7rem; font-weight: 500;
      color: rgba(255,255,255,0.45); text-align: center;
    }
    .inv-craft-row {
      display: flex; align-items: center; gap: 4px;
    }
    .inv-craft-grid {
      display: grid;
      grid-template-columns: repeat(2, 40px);
      gap: 3px;
    }
    .inv-craft-arrow { font-size: 14px; color: rgba(255,255,255,0.35); padding: 0 2px; }
    .inv-craft-result {
      width: 44px; height: 44px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 9px;
      cursor: default;
    }
    .inv-section-sep { height: 1px; background: rgba(255,255,255,0.09); margin: 8px 0 6px; }
    .inv-hotbar-sep  { height: 1px; background: rgba(255,255,255,0.09); margin: 6px 0; }
    .inv-hotbar-row  { margin-top: 0; }
    .inv-tabs {
      display: flex; gap: 3px; flex-wrap: wrap; margin-bottom: 10px;
      padding: 3px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 11px;
    }
    .inv-tab {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.55);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      font-size: 0.72rem; font-weight: 500;
      padding: 5px 14px; cursor: pointer;
      border-radius: 8px;
      transition: background 0.15s, color 0.15s;
    }
    .inv-tab:hover { background: rgba(255,255,255,0.09); color: rgba(255,255,255,0.8); }
    .inv-tab.active { background: rgba(255,255,255,0.17); color: #fff; }
    .inv-creative-grid { min-height: 42px; }
    .inv-creative-slot { cursor: pointer; }

    #inv-cursor {
      position: fixed; pointer-events: none; z-index: 200;
      width: 40px; height: 40px; display: none;
    }

    /* ── Pause screen ── */
    #pause-screen {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.48);
      backdrop-filter: blur(10px) saturate(150%);
      -webkit-backdrop-filter: blur(10px) saturate(150%);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 20; gap: 10px;
    }
    #pause-screen.open { display: flex; }
    #pause-screen h1 {
      font-size: 2.1rem; color: #fff;
      font-weight: 700; letter-spacing: -0.025em;
      margin-bottom: 6px;
      text-shadow: 0 2px 24px rgba(0,0,0,0.4);
    }
    #pause-screen .hint {
      font-size: 0.82rem; color: rgba(255,255,255,0.5);
      text-align: center; line-height: 2;
      margin-bottom: 20px;
    }
    .pause-btn {
      background: rgba(255,255,255,0.13);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      font-size: 0.9rem; font-weight: 500;
      padding: 12px 0;
      cursor: pointer; width: 220px; text-align: center;
      transition: background 0.15s, border-color 0.15s;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
    }
    .pause-btn:hover {
      background: rgba(255,255,255,0.21);
      border-color: rgba(255,255,255,0.3);
    }

    /* ── Settings modal ── */
    #settings-modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: none; align-items: center; justify-content: center;
      z-index: 40;
    }
    #settings-modal.open { display: flex; }
    #settings-panel {
      background: rgba(14, 14, 28, 0.78);
      backdrop-filter: blur(48px) saturate(180%);
      -webkit-backdrop-filter: blur(48px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 22px;
      padding: 26px 34px 30px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.1);
      min-width: 300px;
      display: flex; flex-direction: column; gap: 22px;
    }
    #settings-panel h2 {
      font-size: 1rem; font-weight: 600; letter-spacing: 0.01em;
      color: #fff; text-align: center;
    }
    .settings-row {
      display: flex; flex-direction: column; gap: 8px;
    }
    .settings-row label {
      font-size: 0.82rem; color: rgba(255,255,255,0.65);
    }
    .settings-row input[type=range] {
      width: 100%; cursor: pointer;
      accent-color: #0a84ff;
    }
    #settings-close {
      align-self: center;
      background: rgba(10,132,255,0.82);
      border: 1px solid rgba(10,132,255,0.35);
      border-radius: 14px;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      font-size: 0.88rem; font-weight: 600;
      padding: 11px 32px;
      cursor: pointer;
      transition: background 0.15s;
      box-shadow: 0 2px 12px rgba(10,132,255,0.3);
    }
    #settings-close:hover { background: rgba(10,132,255,1); }

    /* ── Command input ── */
    #command-log {
      position: fixed; bottom: 52px; left: 0;
      padding: 0 10px 6px;
      display: flex; flex-direction: column; gap: 2px;
      pointer-events: none; z-index: 20;
      opacity: 0; transition: opacity 0.4s;
    }
    .cmd-log-line {
      font-family: 'SF Mono', 'Menlo', 'Courier New', monospace;
      font-size: 13px;
      background: rgba(0,0,0,0.48);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      color: rgba(255,255,255,0.88);
      padding: 2px 8px;
      white-space: pre;
    }
    #command-input {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: none; align-items: center;
      background: rgba(0,0,0,0.58);
      backdrop-filter: blur(24px) saturate(150%);
      -webkit-backdrop-filter: blur(24px) saturate(150%);
      border-top: 1px solid rgba(255,255,255,0.1);
      z-index: 20;
    }
    #command-text {
      flex: 1;
      background: transparent;
      border: none; outline: none;
      color: #fff;
      font-family: 'SF Mono', 'Menlo', 'Courier New', monospace;
      font-size: 14px;
      padding: 9px 12px;
      caret-color: #0a84ff;
    }

    /* ── Gamemode label ── */
    #gamemode-label {
      position: fixed; top: 10px; left: 50%;
      transform: translateX(-50%);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      font-size: 12px; font-weight: 500; letter-spacing: 0.03em;
      color: rgba(255,255,255,0.88);
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 20px;
      padding: 4px 14px;
      pointer-events: none;
      display: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
    }
    #inv-tooltip {
      position: fixed;
      pointer-events: none;
      display: none;
      z-index: 1000;
      background: rgba(20, 12, 28, 0.92);
      border: 1px solid rgba(100, 60, 180, 0.7);
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.9);
      white-space: nowrap;
      box-shadow: 1px 1px 6px rgba(0,0,0,0.6);
    }

    /* ── Home screen ── */
    #home-screen {
      position: fixed; inset: 0;
      background: linear-gradient(160deg, #0b1624 0%, #162340 55%, #0b1624 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 60; gap: 12px;
    }
    #home-screen h1 {
      font-size: 2.8rem; color: #fff;
      font-weight: 800; letter-spacing: -0.03em;
      text-shadow: 0 0 48px rgba(80,140,255,0.45), 0 2px 24px rgba(0,0,0,0.7);
      margin-bottom: 4px;
    }
    #home-screen .home-subtitle {
      font-size: 0.83rem; color: rgba(255,255,255,0.38);
      letter-spacing: 0.04em; text-transform: uppercase;
      margin-bottom: 30px;
    }
    .home-btn {
      background: rgba(255,255,255,0.11);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 14px;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      font-size: 0.92rem; font-weight: 500;
      padding: 13px 0; cursor: pointer; width: 240px; text-align: center;
      transition: background 0.15s, border-color 0.15s;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
    }
    .home-btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.2);
      border-color: rgba(255,255,255,0.3);
    }
    .home-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Create world modal ── */
    #create-world-modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      display: none; align-items: center; justify-content: center;
      z-index: 70;
    }
    #create-world-modal.open { display: flex; }
    #create-world-panel {
      background: rgba(14, 14, 28, 0.84);
      backdrop-filter: blur(48px) saturate(180%);
      -webkit-backdrop-filter: blur(48px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 22px;
      padding: 32px 36px 28px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.09);
      width: 360px;
      display: flex; flex-direction: column; gap: 18px;
    }
    #create-world-panel h2 {
      font-size: 1rem; font-weight: 600; letter-spacing: 0.01em;
      color: #fff; text-align: center; margin-bottom: 2px;
    }
    .cw-field { display: flex; flex-direction: column; gap: 7px; }
    .cw-field label {
      font-size: 0.8rem; font-weight: 500;
      color: rgba(255,255,255,0.5); letter-spacing: 0.02em;
    }
    .cw-field input {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 10px;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      font-size: 0.9rem; padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .cw-field input::placeholder { color: rgba(255,255,255,0.25); }
    .cw-field input:focus {
      border-color: rgba(10,132,255,0.55);
      background: rgba(255,255,255,0.1);
    }
    .cw-buttons { display: flex; gap: 10px; margin-top: 4px; }
    .cw-back-btn { flex: 0 0 80px; }
    .cw-create-btn {
      flex: 1;
      background: rgba(10,132,255,0.72) !important;
      border-color: rgba(10,132,255,0.35) !important;
    }
    .cw-create-btn:hover:not(:disabled) {
      background: rgba(10,132,255,0.92) !important;
      border-color: rgba(10,132,255,0.6) !important;
    }

    /* ── Load world modal ── */
    #load-world-modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      display: none; align-items: center; justify-content: center;
      z-index: 70;
    }
    #load-world-modal.open { display: flex; }
    #load-world-panel {
      background: rgba(14, 14, 28, 0.84);
      backdrop-filter: blur(48px) saturate(180%);
      -webkit-backdrop-filter: blur(48px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 22px;
      padding: 28px 32px 24px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.09);
      width: 400px; max-height: 70vh;
      display: flex; flex-direction: column; gap: 16px;
    }
    #load-world-panel h2 {
      font-size: 1rem; font-weight: 600; color: #fff; text-align: center;
    }
    #lw-list {
      overflow-y: auto; display: flex; flex-direction: column; gap: 8px;
      flex: 1; min-height: 60px;
    }
    #lw-list::-webkit-scrollbar { width: 4px; }
    #lw-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
    .lw-empty { color: rgba(255,255,255,0.35); font-size: 0.85rem; text-align: center; padding: 20px 0; }
    .lw-row {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 12px; padding: 10px 14px; gap: 12px;
    }
    .lw-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .lw-name { font-size: 0.9rem; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lw-meta { font-size: 0.75rem; color: rgba(255,255,255,0.38); }
    .lw-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .lw-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 9px; color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      font-size: 0.78rem; font-weight: 500;
      padding: 6px 14px; cursor: pointer;
      transition: background 0.15s;
    }
    .lw-play { background: rgba(10,132,255,0.65); border-color: rgba(10,132,255,0.3); }
    .lw-play:hover { background: rgba(10,132,255,0.9); }
    .lw-del:hover { background: rgba(255,59,48,0.55); border-color: rgba(255,59,48,0.4); }
    .lw-footer { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .lw-storage { width: 100%; display: flex; flex-direction: column; gap: 5px; }
    .lw-storage-label {
      font-size: 0.75rem; color: rgba(255,255,255,0.38);
      display: flex; justify-content: space-between;
    }
    .lw-storage-bar {
      width: 100%; height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px; overflow: hidden;
    }
    .lw-storage-fill {
      height: 100%; border-radius: 2px;
      background: #0a84ff;
      transition: width 0.3s;
    }
    .lw-storage-fill.warn  { background: #ff9f0a; }
    .lw-storage-fill.full  { background: #ff453a; }
  </style>
</head>
<body>
  <div id="crosshair"></div>
  <div id="gamemode-label"></div>
  <div id="damage-flash"></div>
  <div id="water-overlay"></div>
  <div id="hud-bottom">
    <canvas id="hearts"></canvas>
    <div id="hotbar"></div>
  </div>
  <div id="f3">
    <div class="f3-col" id="f3-left"></div>
    <div class="f3-col" id="f3-right"></div>
  </div>
  <div id="inventory"></div>
  <div id="inv-cursor"></div>
  <div id="inv-tooltip"></div>

  <!-- Home screen -->
  <div id="home-screen">
    <h1>Minecraft Prototype</h1>
    <p class="home-subtitle">A voxel world experiment</p>
    <button id="btn-new-world" class="home-btn">New World</button>
    <button id="btn-load-world" class="home-btn">Load World</button>
  </div>

  <!-- Create world modal -->
  <div id="create-world-modal">
    <div id="create-world-panel">
      <h2>Create New World</h2>
      <div class="cw-field">
        <label for="cw-name">World Name</label>
        <input id="cw-name" type="text" placeholder="My World" maxlength="32" autocomplete="off" />
      </div>
      <div class="cw-field">
        <label for="cw-seed">Seed <span style="opacity:0.5;font-weight:400">(optional)</span></label>
        <input id="cw-seed" type="text" placeholder="Leave blank for random" maxlength="32" autocomplete="off" />
      </div>
      <div class="cw-buttons">
        <button id="cw-back" class="home-btn cw-back-btn">Back</button>
        <button id="cw-create" class="home-btn cw-create-btn">Create World</button>
      </div>
    </div>
  </div>

  <!-- Load world modal -->
  <div id="load-world-modal">
    <div id="load-world-panel">
      <h2>Load World</h2>
      <div id="lw-list"></div>
      <div class="lw-footer">
        <div class="lw-storage">
          <div class="lw-storage-label">
            <span>Storage used</span>
            <span id="lw-storage-text">— / 5 MB</span>
          </div>
          <div class="lw-storage-bar">
            <div id="lw-storage-fill" class="lw-storage-fill" style="width:0%"></div>
          </div>
        </div>
        <button id="lw-back" class="home-btn" style="width:120px;padding:10px 0;font-size:0.85rem">Back</button>
      </div>
    </div>
  </div>

  <!-- Pause / start screen -->
  <div id="pause-screen">
    <h1>Minecraft Prototype</h1>
    <p class="hint">
      WASD — Move &nbsp;|&nbsp; Space — Jump &nbsp;|&nbsp; Shift — Sprint<br>
      Left click — Break &nbsp;|&nbsp; Right click — Place<br>
      1-9 / Scroll — Select slot &nbsp;|&nbsp; E — Inventory &nbsp;|&nbsp; Esc — Pause
    </p>
    <button id="pause-resume" class="pause-btn">Resume</button>
    <button id="pause-settings" class="pause-btn">⚙ Settings</button>
    <button id="pause-quit" class="pause-btn" style="margin-top:6px;opacity:0.7">Quit to Title</button>
  </div>

  <!-- Settings modal -->
  <div id="settings-modal">
    <div id="settings-panel">
      <h2>Settings</h2>
      <div class="settings-row">
        <label for="render-dist-slider">Render Distance: <span id="render-dist-val">8</span> chunks</label>
        <input id="render-dist-slider" type="range" min="2" max="12" value="8" step="1" />
      </div>
      <button id="settings-close">Resume</button>
    </div>
  </div>

  <div id="command-log"></div>
  <div id="command-input"><input id="command-text" type="text" maxlength="200" autocomplete="off" spellcheck="false" /></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
